<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Disney Wait Times</title>
  <style>
    body {
      font-family: Arial;
      background: #111;
      color: white;
      padding: 10px;
    }
    .ride {
      display: flex;
      justify-content: space-between;
      padding: 5px 0;
    }
  </style>
</head>
<body>

<h1>Magic Kingdom</h1>
<div id="rides">Loading...</div>

<script>
function fetchTimes() {
  var xhr = new XMLHttpRequest();
  xhr.open("GET", "https://api.allorigins.win/raw?url=https://queue-times.com/parks/6/queue_times.json", true);

  xhr.onload = function() {
    if (xhr.status === 200) {
      var data = JSON.parse(xhr.responseText);
      render(data);
    } else {
      document.getElementById("rides").innerHTML = "Error loading data";
    }
  };

  xhr.send();
}

function render(data) {
  var container = document.getElementById("rides");
  container.innerHTML = "";

  data.lands.forEach(function(land) {
    land.rides.forEach(function(ride) {
      var div = document.createElement("div");
      div.className = "ride";

      div.innerHTML =
        "<span>" + ride.name + "</span>" +
        "<span>" +
        (ride.is_open ? ride.wait_time + " min" : "Closed") +
        "</span>";

      container.appendChild(div);
    });
  });
}

fetchTimes();
setInterval(fetchTimes, 60000);
</script>

</body>
</html>
