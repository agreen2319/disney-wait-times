<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Disney Wait Times</title>
  <style>
    body {
      font-family: Arial;
      background: #111;
      color: white;
      padding: 10px;
    }
    .ride-name {
      margin-left: 15px;
    }
    .ride {
      display: flex;
      justify-content: space-between;
      padding: 5px 0;
      border-bottom: 1px solid #222;
    }
  </style>
</head>
<body>

<h1>Walt Disney World</h1>
<p id="updated">Last updated: --</p>
<div id="rides">Loading...</div>

<script>
  
var landOrder = [
  "MK - Adventureland",
  "MK - Fantasyland",
  "MK - Frontierland",
  "MK - Liberty Square",
  "MK - Tomorrowland",

  "EPCOT",
  "Hollywood Studios",
  "Animal Kingdom"
];

// Map each ride to a land
var rideToLand = {
  // Magic Kingdom
  "Jungle Cruise": "MK - Adventureland",
  "Pirates of the Caribbean": "MK - Adventureland",

  "it's a small world": "MK - Fantasyland",
  "Dumbo the Flying Elephant": "MK - Fantasyland",
  "Under the Sea ~ Journey of the Little Mermaid": "MK - Fantasyland",
  "Peter Pan's Flight": "MK - Fantasyland",
  "Seven Dwarfs Mine Train": "MK - Fantasyland",
  "The Barnstormer": "MK - Fantasyland",
  "The Many Adventures of Winnie the Pooh": "MK - Fantasyland",

  "Big Thunder Mountain Railroad": "MK - Frontierland",
  "Tiana's Bayou Adventure": "MK - Frontierland",

  "Haunted Mansion": "MK - Liberty Square",

  "Astro Orbiter": "MK - Tomorrowland",
  "Buzz Lightyear's Space Ranger Spin": "MK - Tomorrowland",
  "Space Mountain": "MK - Tomorrowland",
  "Tomorrowland Speedway": "MK - Tomorrowland",
  "Tomorrowland Transit Authority PeopleMover": "MK - Tomorrowland",
  "TRON Lightcycle Run": "MK - Tomorrowland",

  // Hollywood Studios
  "Mickey & Minnie's Runaway Railway": "Hollywood Studios",
  "Slinky Dog Dash": "Hollywood Studios",
  "Rock 'n' Roller Coaster Starring Aerosmith": "Hollywood Studios",
  "The Twilight Zone Tower of Terror": "Hollywood Studios",
  "Star Tours – The Adventures Continue": "Hollywood Studios",
  "Millennium Falcon: Smugglers Run": "Hollywood Studios",
  "Star Wars: Rise of the Resistance": "Hollywood Studios",

  // EPCOT
  "Guardians of the Galaxy: Cosmic Rewind": "EPCOT",
  "Journey Into Imagination With Figment": "EPCOT",
  "Living with the Land": "EPCOT",
  "Mission: SPACE": "EPCOT",
  "Remy's Ratatouille Adventure": "EPCOT",
  "The Seas with Nemo & Friends": "EPCOT",
  "Soarin' Around the World": "EPCOT",
  "Spaceship Earth": "EPCOT",
  "Test Track": "EPCOT",

  // Animal Kingdom
  "Avatar Flight of Passage": "Animal Kingdom",
  "Expedition Everest - Legend of the Forbidden Mountain": "Animal Kingdom",
  "Kali River Rapids": "Animal Kingdom",
  "Kilimanjaro Safaris": "Animal Kingdom",
  "Na'vi River Journey": "Animal Kingdom"
};
  

function fetchTimes() {
  var urls = [
    "https://queue-times.com/parks/6/queue_times.json",  // Magic Kingdom
    "https://queue-times.com/parks/7/queue_times.json",  // Hollywood Studios
    "https://queue-times.com/parks/8/queue_times.json",  // Animal Kingdom
    "https://queue-times.com/parks/5/queue_times.json"   // EPCOT
  ];

  var proxy = "https://api.allorigins.win/raw?url=";

  var results = [];
  var completed = 0;

  urls.forEach(function(url, index) {
    var xhr = new XMLHttpRequest();
    xhr.open("GET", proxy + url, true);

    xhr.onload = function() {
      if (xhr.status === 200) {
        results[index] = JSON.parse(xhr.responseText);
      }

      completed++;

      if (completed === urls.length) {
        combineAndRender(results);
      }
    };

    xhr.send();
  });
}

  
function combineAndRender(allData) {
  var combined = { lands: [] };

  allData.forEach(function(data) {
    if (data && data.lands) {
      combined.lands = combined.lands.concat(data.lands);
    }
  });

  render(combined);
}
  

function render(data) {
  var container = document.getElementById("rides");
  container.innerHTML = "";

  var ridesByLand = {};

  // Initialize each land
  landOrder.forEach(function(land) {
    ridesByLand[land] = [];
  });

  // Collect rides
  data.lands.forEach(function(apiLand) {
    apiLand.rides.forEach(function(ride) {

      var land = rideToLand[ride.name];

      if (land) {
        ridesByLand[land].push(ride);
      }

    });
  });

  // Render in order
  landOrder.forEach(function(land) {

    var rides = ridesByLand[land];

    if (rides.length === 0) return;

    // Sort by wait time (highest first)
    rides.sort(function(a, b) {
      return (b.wait_time || 0) - (a.wait_time || 0);
    });

    // Add land header
    var header = document.createElement("h2");
    header.innerText = land;
    header.style.fontSize = "18px";
    header.style.marginTop = "15px";

    container.appendChild(header);

    // Add rides & color code
    
    rides.forEach(function(ride) {
      var div = document.createElement("div");
      div.className = "ride";
    
      var waitText = "";
      var color = "white";
    
      if (!ride.is_open) {
        waitText = "Closed";
        color = "#888";
      } else {
        var wait = ride.wait_time;
        waitText = wait + " min";
    
        if (wait <= 10) color = "green";
        else if (wait <= 25) color = "lightgreen";
        else if (wait <= 45) color = "yellow";
        else if (wait <= 55) color = "orange";
        else color = "red";
      }
    
      div.innerHTML =
        '<span class="ride-name">' + ride.name + '</span>' +
        '<span style="color:' + color + '">' + waitText + '</span>';
    
      container.appendChild(div);
    });


  });

  // timestamp
  var now = new Date();
  document.getElementById("updated").innerHTML =
    "Last updated: " + now.toLocaleTimeString();
}


fetchTimes();
setInterval(fetchTimes, 60000);
</script>

</body>
</html>
