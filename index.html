<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Disney Wait Times</title>
  <style>
    body {
      font-family: Arial;
      background: #111;
      color: white;
      padding: 10px;
    }
    .ride-name {
      margin-left: 15px;
    }
    .ride {
      display: flex;
      justify-content: space-between;
      padding: 5px 0;
      border-bottom: 1px solid #222;
    }
    #container {
      display: flex;
      gap: 50px;
      justify-content: center;   /* centers the columns horizontally */
      max-width: 900px;          /* keeps layout from getting too wide */
      margin: 0 auto;            /* centers the whole container */
    }
    .column {
      width: 50%;
    }

  </style>
</head>

<body>

<h1 style="text-align:center;">Disney Parks Wait Times</h1>
<p style="text-align:center; font-style: italic; font-size: 12px; margin-top: -5px;">
  Powered by 
  <a href="https://queue-times.com" target="_blank" style="color: lightblue; text-decoration: none;">
    Queue-Times.com
  </a>
</p>

<div id="container">
  <div class="column">
    <h2>Walt Disney World</h2>
    <div id="wdw"></div>
  </div>

  <div class="column">
    <h2>Disneyland Resort</h2>
    <div id="dlr"></div>
  </div>
</div>

<p id="updated" style="text-align:center; margin-top: 15px;">Last updated: --</p>


<script>

// Map each ride to a land

  142: "MK - Fantasyland", // pooh

  130: "MK - Frontierland / Liberty Square", // thunder
  13630: "MK - Frontierland / Liberty Square", // tiana's
  140: "MK - Frontierland / Liberty Square", // haunted mansion

  248: "MK - Tomorrowland", // astro orbiter
  131: "MK - Tomorrowland", // buzz
  138: "MK - Tomorrowland", // space
  143: "MK - Tomorrowland", // AUTOPIA
  1190: "MK - Tomorrowland", // peoplemover
  11527: "MK - Tomorrowland", // Tron

  // Hollywood Studios
  6361: "Hollywood Studios", // runaway railway
  5476: "Hollywood Studios", // slinky

  // EPCOT

  155: "EPCOT", // journey w/ figment
  156: "EPCOT", // land living
  158: "EPCOT", // mission space
  10914: "EPCOT", // remy's
  153: "EPCOT", // the seas
  151: "EPCOT", // soarin
  159: "EPCOT", // spaceship earth
  160: "EPCOT", // test track

  // Animal Kingdom
  4439: "Animal Kingdom", // flight of passage
  110: "Animal Kingdom", // everest
  112: "Animal Kingdom", // kali
  113: "Animal Kingdom", // safaris
  4438: "Animal Kingdom" // na'vi
};

  
var dlrRideToLand = {
  // Adventureland / Frontierland
  323: "DL - Adventureland / Frontierland", // thunder
  296: "DL - Adventureland / Frontierland", // jungle cruise
  326: "DL - Adventureland / Frontierland", // indiana jones

  // Bayou / New Orleans Square
  304: "DL - New Orleans Square / Bayou Country", // pooh
  14168: "DL - New Orleans Square / Bayou Country", // tiana's
  13958: "DL - New Orleans Square / Bayou Country", // haunted mansion
  289: "DL - New Orleans Square / Bayou Country", // pirates

  // Fantasyland
  307: "DL - Fantasyland", // small world

  303: "DL - Fantasyland", // casey jr
  275: "DL - Fantasyland", // dumbo
  279: "DL - Fantasyland", // matterhorn
  280: "DL - Fantasyland", // mr toad

  283: "DL - Fantasyland", // snow white

  // Toontown
  324: "DL - Toontown", // chip n dale

  // Galaxy's Edge

  6340: "DL - Galaxy's Edge", // rotr

  // Tomorrowland

  // DCA
  329: "California Adventure", // guardians
  8843: "California Adventure", // web slingers

  302: "California Adventure", // grizzly river run
  291: "California Adventure", // mike n sulley
  319: "California Adventure", // goofy's
  322: "California Adventure", // incredicoaster
  313: "California Adventure" // midway mania
};


function fetchTimes() {
  var urls = [
    // WDW
    "https://queue-times.com/parks/6/queue_times.json",  // Magic Kingdom
    "https://queue-times.com/parks/7/queue_times.json",  // Hollywood Studios
    "https://queue-times.com/parks/8/queue_times.json",  // Animal Kingdom
    "https://queue-times.com/parks/5/queue_times.json",  // EPCOT

    
    // Disneyland Resort
    "https://queue-times.com/parks/16/queue_times.json", // Disneyland
    "https://queue-times.com/parks/17/queue_times.json"  // DCA
  ];

  var proxy = "https://glistening-blini-23387c.netlify.app/.netlify/functions/proxy?url=";
  var results = [];
  var completed = 0;

  urls.forEach(function(url, index) {
    var xhr = new XMLHttpRequest();
    xhr.open("GET", proxy + encodeURIComponent(url), true);
    
    xhr.onload = function() {
      if (xhr.status === 200) {
        results[index] = JSON.parse(xhr.responseText);
      }

      completed++;

      if (completed === urls.length) {
        combineAndRender(results);
      }
    };

    xhr.send();
  });
}

  
function combineAndRender(allData) {
  var combined = { lands: [] };

  allData.forEach(function(data) {
    if (data && data.lands) {
      combined.lands = combined.lands.concat(data.lands);
    }
  });

  render(combined);
}
  

function render(data) {
  var wdwContainer = document.getElementById("wdw");
  var dlrContainer = document.getElementById("dlr");

  wdwContainer.innerHTML = "";
  dlrContainer.innerHTML = "";

  var wdwRides = {};
  var dlrRides = {};

  landOrder.forEach(function(land) {
    wdwRides[land] = [];
  });

  dlrLandOrder.forEach(function(land) {
    dlrRides[land] = [];
  });

  data.lands.forEach(function(apiLand) {
    apiLand.rides.forEach(function(ride) {

      var wdwLand = rideToLand[ride.id];
      if (wdwLand) wdwRides[wdwLand].push(ride);

      var dlrLand = dlrRideToLand[ride.id];
      if (dlrLand) dlrRides[dlrLand].push(ride);

    });
  });

  renderColumn(wdwContainer, landOrder, wdwRides);
  renderColumn(dlrContainer, dlrLandOrder, dlrRides);

  // timestamp
  var now = new Date();
  document.getElementById("updated").innerHTML =
    "Last updated: " + now.toLocaleTimeString();
}


function renderColumn(container, order, ridesByLand) {

  order.forEach(function(land) {

    var rides = ridesByLand[land];
    if (!rides || rides.length === 0) return;

    rides.sort(function(a, b) {
      return (b.wait_time || 0) - (a.wait_time || 0);
    });

    var header = document.createElement("h3");
    header.innerText = land;
    header.style.marginTop = "12px";
    container.appendChild(header);

    rides.forEach(function(ride) {
      var div = document.createElement("div");
      div.className = "ride";

      var waitText = "";
      var color = "white";

      if (!ride.is_open) {
        waitText = "Closed";
        color = "#888";
      } else {
        var wait = ride.wait_time;
        waitText = wait + " min";

        if (wait <= 10) color = "green";
        else if (wait <= 20) color = "lightgreen";
        else if (wait <= 40) color = "yellow";
        else if (wait <= 55) color = "orange";
        else color = "red";
      }

      div.innerHTML =
        '<span class="ride-name">' + ride.name + '</span>' +
        '<span style="color:' + color + '">' + waitText + '</span>';

      container.appendChild(div);
    });

  });
}


fetchTimes();
setInterval(fetchTimes, 60000);
</script>

</body>
</html>
