<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Disney Wait Times</title>
  <style>
    body {
      font-family: Arial;
      background: #111;
      color: white;
      padding: 10px;
    }
    .ride-name {
      margin-left: 15px;
    }
    .ride {
      display: flex;
      justify-content: space-between;
      padding: 5px 0;
      border-bottom: 1px solid #222;
    }
  </style>
</head>
<body>

<h1>Walt Disney World</h1>
<p id="updated">Last updated: --</p>
<div id="rides">Loading...</div>

<script>
  
var landOrder = [
  "MK - Adventureland",
  "MK - Fantasyland",
  "MK - Frontierland",
  "MK - Liberty Square",
  "MK - Tomorrowland",

  "EPCOT",
  "Hollywood Studios",
  "Animal Kingdom"
];

// Map each ride to a land
var rideToLand = {
  // Magic Kingdom
  134: "MK - Adventureland", // Jungle Cruise
  137: "MK - Adventureland", // Pirates

  133: "MK - Fantasyland", // small world
  132: "MK - Fantasyland", // dumbo
  127: "MK - Fantasyland", // little mermaid
  136: "MK - Fantasyland", // peter pan
  129: "MK - Fantasyland", // seven dwarfs
  126: "MK - Fantasyland", // barnstormer
  142: "MK - Fantasyland", // pooh

  130: "MK - Frontierland", // thunder
  13630: "MK - Frontierland", // tiana's

  140: "MK - Liberty Square", // haunted mansion

  248: "MK - Tomorrowland", // astro orbiter
  131: "MK - Tomorrowland", // buzz
  138: "MK - Tomorrowland", // space
  143: "MK - Tomorrowland", // AUTOPIA
  1190: "MK - Tomorrowland", // peoplemover
  11527: "MK - Tomorrowland", // Tron

  // Hollywood Studios
  6361: "Hollywood Studios", // runaway railway
  5476: "Hollywood Studios", // slinky
  16342: "Hollywood Studios", // rock n roller
  123: "Hollywood Studios", // tower of terror
  120: "Hollywood Studios", // star tours
  6368: "Hollywood Studios", // smugglers run
  6369: "Hollywood Studios", // rotr

  // EPCOT
  10916: "EPCOT", // guardians
  155: "EPCOT", // journey w/ figment
  156: "EPCOT", // land living
  158: "EPCOT", // mission space
  10914: "EPCOT", // remy's
  153: "EPCOT", // the seas
  151: "EPCOT", // soarin
  159: "EPCOT", // spaceship earth
  160: "EPCOT", // test track

  // Animal Kingdom
  4439: "Animal Kingdom", // flight of passage
  110: "Animal Kingdom", // everest
  112: "Animal Kingdom", // kali
  113: "Animal Kingdom", // safaris
  4438: "Animal Kingdom" // na'vi
};
  

function fetchTimes() {
  var urls = [
    "https://queue-times.com/parks/6/queue_times.json",  // Magic Kingdom
    "https://queue-times.com/parks/7/queue_times.json",  // Hollywood Studios
    "https://queue-times.com/parks/8/queue_times.json",  // Animal Kingdom
    "https://queue-times.com/parks/5/queue_times.json"   // EPCOT
  ];

  var proxy = "https://api.allorigins.win/raw?url=";

  var results = [];
  var completed = 0;

  urls.forEach(function(url, index) {
    var xhr = new XMLHttpRequest();
    xhr.open("GET", proxy + url, true);

    xhr.onload = function() {
      if (xhr.status === 200) {
        results[index] = JSON.parse(xhr.responseText);
      }

      completed++;

      if (completed === urls.length) {
        combineAndRender(results);
      }
    };

    xhr.send();
  });
}

  
function combineAndRender(allData) {
  var combined = { lands: [] };

  allData.forEach(function(data) {
    if (data && data.lands) {
      combined.lands = combined.lands.concat(data.lands);
    }
  });

  render(combined);
}
  

function render(data) {
  var container = document.getElementById("rides");
  container.innerHTML = "";

  var ridesByLand = {};

  // Initialize each land
  landOrder.forEach(function(land) {
    ridesByLand[land] = [];
  });

  // Collect rides
  data.lands.forEach(function(apiLand) {
    apiLand.rides.forEach(function(ride) {

      var land = rideToLand[ride.id];

      if (land) {
        ridesByLand[land].push(ride);
      }

    });
  });

  // Render in order
  landOrder.forEach(function(land) {

    var rides = ridesByLand[land];

    if (rides.length === 0) return;

    // Sort by wait time (highest first)
    rides.sort(function(a, b) {
      return (b.wait_time || 0) - (a.wait_time || 0);
    });

    // Add land header
    var header = document.createElement("h2");
    header.innerText = land;
    header.style.fontSize = "18px";
    header.style.marginTop = "15px";

    container.appendChild(header);

    // Add rides & color code
    
    rides.forEach(function(ride) {
      var div = document.createElement("div");
      div.className = "ride";
    
      var waitText = "";
      var color = "white";
    
      if (!ride.is_open) {
        waitText = "Closed";
        color = "#888";
      } else {
        var wait = ride.wait_time;
        waitText = wait + " min";
    
        if (wait <= 10) color = "green";
        else if (wait <= 25) color = "lightgreen";
        else if (wait <= 45) color = "yellow";
        else if (wait <= 55) color = "orange";
        else color = "red";
      }
    
      div.innerHTML =
        '<span class="ride-name">' + ride.name + '</span>' +
        '<span style="color:' + color + '">' + waitText + '</span>';
    
      container.appendChild(div);
    });


  });

  // timestamp
  var now = new Date();
  document.getElementById("updated").innerHTML =
    "Last updated: " + now.toLocaleTimeString();
}


fetchTimes();
setInterval(fetchTimes, 60000);
</script>

</body>
</html>
