<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Disney Wait Times</title>
  <style>
    body {
      font-family: Arial;
      background: #111;
      color: white;
      padding: 10px;
    }
    .ride {
      display: flex;
      justify-content: space-between;
      padding: 5px 0;
    }
  </style>
</head>
<body>

<h1>Magic Kingdom</h1>
<p id="updated">Last updated: --</p>
<div id="rides">Loading...</div>

<script>

var popularRides = [
  "Jungle Cruise",
  "Pirates of the Caribbean",
  "it's a small world",
  "Dumbo the Flying Elephant",
  "Under the Sea - Journey of The Little Mermaid",
  "Peter Pan's Flight",
  "Seven Dwarfs Mine Train",
  "The Barnstormer",
  "The Many Adventures of Winnie the Pooh",
  "Big Thunder Mountain Railroad",
  "Tiana's Bayou Adventure",
  "Haunted Mansion",
  "Astro Orbiter",
  "Buzz Lightyear's Space Ranger Spin",
  "Space Mountain",
  "Tomorrowland Speedway",
  "Tomorrowland Transit Authority PeopleMover",
  "TRON Lightcycle / Run"
];
  
function fetchTimes() {
  var xhr = new XMLHttpRequest();
  xhr.open("GET", "https://api.allorigins.win/raw?url=https://queue-times.com/parks/6/queue_times.json", true);

  xhr.onload = function() {
    if (xhr.status === 200) {
      var data = JSON.parse(xhr.responseText);
      render(data);
    } else {
      document.getElementById("rides").innerHTML = "Error loading data";
    }
  };

  xhr.send();
}


function render(data) {
  var container = document.getElementById("rides");
  container.innerHTML = "";

  var ridesList = [];
  
  data.lands.forEach(function(land) {
    land.rides.forEach(function(ride) {
      if (popularRides.indexOf(ride.name) !== -1) {
        ridesList.push(ride);
      }
    });
  });

  // sort by wait time (highest first)
  ridesList.sort(function(a, b) {
    return (b.wait_time || 0) - (a.wait_time || 0);
  });

  ridesList.forEach(function(ride) {
    var div = document.createElement("div");
    div.className = "ride";

    div.innerHTML =
      "<span>" + ride.name + "</span>" +
      "<span>" +
      (ride.is_open ? ride.wait_time + " min" : "Closed") +
      "</span>";

    container.appendChild(div);
  });


  // update timestamp
  var now = new Date();
  document.getElementById("updated").innerHTML =
    "Last updated: " + now.toLocaleTimeString();
}


fetchTimes();
setInterval(fetchTimes, 10000);
</script>

</body>
</html>
