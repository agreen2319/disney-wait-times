<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Disney Wait Times</title>
  <style>
    body {
      font-family: Arial;
      background: #111;
      color: white;
      padding: 10px;
    }
    .ride {
      display: flex;
      justify-content: space-between;
      padding: 5px 0;
    }
  </style>
</head>
<body>

<h1>Magic Kingdom</h1>
<p id="updated">Last updated: --</p>
<div id="rides">Loading...</div>

<script>

var popularRides = [
  "Jungle Cruise",
  "Pirates of the Caribbean",
  "it's a small world",
  "Dumbo the Flying Elephant",
  "Under the Sea - Journey of The Little Mermaid",
  "Peter Pan's Flight",
  "Seven Dwarfs Mine Train",
  "The Barnstormer",
  "The Many Adventures of Winnie the Pooh",
  "Big Thunder Mountain Railroad",
  "Tiana's Bayou Adventure",
  "Haunted Mansion",
  "Astro Orbiter",
  "Buzz Lightyear's Space Ranger Spin",
  "Space Mountain",
  "Tomorrowland Speedway",
  "Tomorrowland Transit Authority PeopleMover",
  "TRON Lightcycle / Run"
];


var landOrder = [
  "Adventureland",
  "Fantasyland",
  "Frontierland",
  "Liberty Square",
  "Tomorrowland"
];

// Map each ride to a land
var rideToLand = {
  "Jungle Cruise": "Adventureland",
  "Pirates of the Caribbean": "Adventureland",

  "it's a small world": "Fantasyland",
  "Dumbo the Flying Elephant": "Fantasyland",
  "Under the Sea - Journey of the Little Mermaid": "Fantasyland",
  "Peter Pan's Flight": "Fantasyland",
  "Seven Dwarfs Mine Train": "Fantasyland",
  "The Barnstormer": "Fantasyland",
  "The Many Adventures of Winnie the Pooh": "Fantasyland",

  "Big Thunder Mountain Railroad": "Frontierland",
  "Tiana's Bayou Adventure": "Frontierland",

  "Haunted Mansion": "Liberty Square",

  "Astro Orbiter": "Tomorrowland",
  "Buzz Lightyear's Space Ranger Spin": "Tomorrowland",
  "Space Mountain": "Tomorrowland",
  "Tomorrowland Speedway": "Tomorrowland",
  "Tomorrowland Transit Authority PeopleMover": "Tomorrowland",
  "TRON Lightcycle / Run": "Tomorrowland"
};

  
function fetchTimes() {
  var xhr = new XMLHttpRequest();
  xhr.open("GET", "https://api.allorigins.win/raw?url=https://queue-times.com/parks/6/queue_times.json", true);

  xhr.onload = function() {
    if (xhr.status === 200) {
      var data = JSON.parse(xhr.responseText);
      render(data);
    } else {
      document.getElementById("rides").innerHTML = "Error loading data";
    }
  };

  xhr.send();
}


function render(data) {
  var container = document.getElementById("rides");
  container.innerHTML = "";

  var ridesByLand = {};

  // Initialize each land
  landOrder.forEach(function(land) {
    ridesByLand[land] = [];
  });

  // Collect rides
  data.lands.forEach(function(apiLand) {
    apiLand.rides.forEach(function(ride) {

      var land = rideToLand[ride.name];

      if (land) {
        ridesByLand[land].push(ride);
      }

    });
  });

  // Render in order
  landOrder.forEach(function(land) {

    var rides = ridesByLand[land];

    if (rides.length === 0) return;

    // Sort by wait time (highest first)
    rides.sort(function(a, b) {
      return (b.wait_time || 0) - (a.wait_time || 0);
    });

    // Add land header
    var header = document.createElement("h2");
    header.innerText = land;
    header.style.fontSize = "18px";
    header.style.marginTop = "15px";

    container.appendChild(header);

    // Add rides & color code
    
    rides.forEach(function(ride) {
      var div = document.createElement("div");
      div.className = "ride";
    
      var waitText = "";
      var color = "white";
    
      if (!ride.is_open) {
        waitText = "Closed";
        color = "#888";
      } else {
        var wait = ride.wait_time;
        waitText = wait + " min";
    
        if (wait <= 10) color = "green";
        else if (wait <= 20) color = "lightgreen";
        else if (wait <= 40) color = "yellow";
        else if (wait <= 55) color = "orange";
        else color = "red";
      }
    
      div.innerHTML =
        '<span class="ride-name">' + ride.name + '</span>' +
        '<span style="color:' + color + '">' + waitText + '</span>';
    
      container.appendChild(div);
    });


  });

  // timestamp
  var now = new Date();
  document.getElementById("updated").innerHTML =
    "Last updated: " + now.toLocaleTimeString();
}


fetchTimes();
setInterval(fetchTimes, 10000);
</script>

</body>
</html>
